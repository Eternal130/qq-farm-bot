syntax = "proto3";
package gamepb.avatarframepb;
option go_package = "qq-farm-bot/proto/avatarframepb";

enum AvatarFrameType {
    AVATAR_FRAME_UNKNOWN = 0;
    PERMANENT = 1;
}

message AvatarFrame {
    int64 id = 1;
    int32 type = 2;
    int64 count = 3;
    int32 priority = 4;
}

message EquipRequest {
    int64 id = 1;
}
message EquipReply {}

message AvatarFramesEquipedRequest {}
message AvatarFramesEquipedReply {
    repeated AvatarFrame frames = 1;
}

message AvatarFramesOwnedRequest {}
message AvatarFramesOwnedReply {
    repeated AvatarFrame frames = 1;
}
