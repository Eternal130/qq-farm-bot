message EmailPreview {
    string email_id = 1;
    int32 email_type = 2;
    string title = 3;
    bool is_read = 4;
    bool has_reward = 5;
    int64 send_time = 6;
    string desc = 7;
    int64 expire_time = 8;
    string tips = 9;
}

message EmailDetail {
    string email_id = 1;
    int32 email_type = 2;
    string title = 3;
    string content = 4;
    int64 send_time = 6;
    int64 expire_time = 7;
    bool is_read = 8;
    string reason = 9;
    bool is_claimed = 10;
    string tips = 11;
}

message GetEmailListRequest {
    int32 email_type = 1;
}
message GetEmailListReply {
    repeated EmailPreview emails = 1;
}

message ReadEmailRequest {
    int32 email_type = 1;
    string email_id = 2;
}
message ReadEmailReply {}

message BatchReadEmailRequest {
    int32 email_type = 1;
}
message BatchReadEmailReply {}

message ClaimEmailRequest {
    int32 email_type = 1;
    string email_id = 2;
}
message ClaimEmailReply {}

message BatchClaimEmailRequest {
    int32 email_type = 1;
}
message BatchClaimEmailReply {}

message BatchDeleteEmailRequest {
    int32 email_type = 1;
}
message BatchDeleteEmailReply {}

message NewEmailNotify {}
